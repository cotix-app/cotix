    <link rel="manifest" href="/manifest.webmanifest" />

    <!-- viewport -->

    <!-- color barra navegador móvil -->
    <meta name="theme-color" content="#1d4ed8" />

    <meta name="mobile-web-app-capable" content="yes" />
    

    <title>Cotix</title>

    <style>
      /* splash inicial antes de cargar React */
      #initial-splash {
        position: fixed;
        inset: 0;
        background: #1d4ed8;
        display: flex;
        align-items: center;
        justify-content: center;
        z-index: 9999;
      }

      #initial-splash img {
        width: 220px;
        animation: fadeIn 1s ease-in-out;
      }

      @keyframes fadeIn {
        from {
          opacity: 0;
          transform: scale(0.95);
        }
        to {
          opacity: 1;
          transform: scale(1);
        }
      }
    </style>
  </head>
